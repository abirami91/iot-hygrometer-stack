services:
  hygro-collector:
    build: ./collector
    container_name: hygro-collector
    restart: unless-stopped
    privileged: true

    command: >
      bash -lc "hciconfig hci0 reset || true;
      python /app/gatt_collector.py"

    environment:
      API_BASE_URL: "http://hygro-cloud:8000"
      INTERVAL_SECONDS: "1200"
      SCAN_TIMEOUT: "${SCAN_TIMEOUT:-60}"
      CONNECT_TIMEOUT: "${CONNECT_TIMEOUT:-20}"
      NOTIFY_WINDOW_SECS: "${NOTIFY_WINDOW_SECS:-60}"
      HUMIDITY_SCALE: "${HUMIDITY_SCALE:-1.00}"
      PRINT_RAW: "${PRINT_RAW:-0}"
      ROOM_RETRIES: "${ROOM_RETRIES:-1}"
      ROOM_RETRY_DELAY_SECS: "${ROOM_RETRY_DELAY_SECS:-3}"
      BETWEEN_ROOMS_SECS: "${BETWEEN_ROOMS_SECS:-2}"
      DBUS_SYSTEM_BUS_ADDRESS: "unix:path=/run/dbus/system_bus_socket"

    volumes:
      - ./data:/data
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket:ro

    depends_on:
      - hygro-cloud

  hygro-cloud:
    build: ./server
    container_name: hygro-cloud
    restart: unless-stopped
    ports:
      - "${BIND_IP:-0.0.0.0}:8081:8000"
    environment:
      DBUS_SYSTEM_BUS_ADDRESS: "unix:path=/run/dbus/system_bus_socket"
    volumes:
      - ./data:/data
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket:ro
    privileged: true

  hygro-agent:
    build: ./agent
    container_name: hygro-agent
    restart: unless-stopped
    environment:
      DB_PATH: /data/hygro.db
      OUT_PATH: /data/insights/latest.json
      INTERVAL_MINUTES: "20"
      HUMIDITY_WARN: "60"
      HUMIDITY_ALERT: "65"
    volumes:
      - ./data:/data
    depends_on:
      - hygro-cloud

  hygro-reporter:
    build: ./reporter
    container_name: hygro-reporter
    restart: unless-stopped
    environment:
      TZ: "Europe/Berlin"
      DATA_DIR: "/data"
      DB_PATH: "/data/hygro.db"
      REPORTS_DIR: "/data/reports"
      HUMIDITY_WARN: "60"
      HUMIDITY_ALERT: "65"
    volumes:
      - ./data:/data
    depends_on:
      - hygro-cloud